name: Build deb

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: waruhachi/theos-action@v2.4.6
        with:
          theos-src: theos/theos
          theos-branch: master
          sdks-src: theos/sdks
          sdks-branch: master
          altlist: true
          altlist-src: opa334/AltList
          altlist-branch: main

      - name: Build package
        run: |
          make clean
          make package FINALPACKAGE=1
          test -n "$(ls -1 packages/*.deb 2>/dev/null)" || (echo "No .deb produced" && exit 1)
          ls -la packages/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: backgrounderaction15autostate-deb
          path: packages/*.deb
